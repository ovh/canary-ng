---
services:

  consul:
    container_name: canary-ng-consul
    image: hashicorp/consul:1.20
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgresql:
    container_name: canary-ng-postgresql
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: canary
      POSTGRES_PASSWORD: canary
      POSTGRES_DB: canary
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canary"]
      interval: 5s
      timeout: 5s
      retries: 10

  register-postgresql:
    container_name: canary-ng-register-postgresql
    image: &register-image curlimages/curl:8.11.1
    restart: "no"
    depends_on:
      consul:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    command:
      - "-sS"
      - "--fail"
      - "--retry"
      - "10"
      - "--retry-all-errors"
      - "-X"
      - "PUT"
      - "--data"
      - '{"Node":"canary-postgresql","Address":"postgresql","NodeMeta":{"driver":"postgresql"}}'
      - "http://consul:8500/v1/catalog/register"

  mysql:
    container_name: canary-ng-mysql
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: canary
      MYSQL_DATABASE: canary
      MYSQL_USER: canary
      MYSQL_PASSWORD: canary
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pcanary"]
      interval: 5s
      timeout: 5s
      retries: 15

  register-mysql:
    container_name: canary-ng-register-mysql
    image: *register-image
    restart: "no"
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    command:
      - "-sS"
      - "--fail"
      - "--retry"
      - "10"
      - "--retry-all-errors"
      - "-X"
      - "PUT"
      - "--data"
      - '{"Node":"canary-mysql","Address":"mysql","NodeMeta":{"driver":"mysql"}}'
      - "http://consul:8500/v1/catalog/register"

  mongodb:
    container_name: canary-ng-mongodb
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: canary
      MONGO_INITDB_ROOT_PASSWORD: canary
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok'"]
      interval: 5s
      timeout: 5s
      retries: 15

  register-mongodb:
    container_name: canary-ng-register-mongodb
    image: *register-image
    restart: "no"
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    command:
      - "-sS"
      - "--fail"
      - "--retry"
      - "10"
      - "--retry-all-errors"
      - "-X"
      - "PUT"
      - "--data"
      - '{"Node":"canary-mongodb","Address":"mongodb","NodeMeta":{"driver":"mongodb"}}'
      - "http://consul:8500/v1/catalog/register"

  clickhouse:
    container_name: canary-ng-clickhouse
    image: clickhouse/clickhouse-server:24.12
    environment:
      CLICKHOUSE_USER: canary
      CLICKHOUSE_PASSWORD: canary
      CLICKHOUSE_DB: canary
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user canary --password canary --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 15

  register-clickhouse:
    container_name: canary-ng-register-clickhouse
    image: *register-image
    restart: "no"
    depends_on:
      consul:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command:
      - "-sS"
      - "--fail"
      - "--retry"
      - "10"
      - "--retry-all-errors"
      - "-X"
      - "PUT"
      - "--data"
      - '{"Node":"canary-clickhouse","Address":"clickhouse","NodeMeta":{"driver":"clickhouse"}}'
      - "http://consul:8500/v1/catalog/register"

  valkey:
    container_name: canary-ng-valkey
    image: valkey/valkey:8.0
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  register-valkey:
    container_name: canary-ng-register-valkey
    image: *register-image
    restart: "no"
    depends_on:
      consul:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command:
      - "-sS"
      - "--fail"
      - "--retry"
      - "10"
      - "--retry-all-errors"
      - "-X"
      - "PUT"
      - "--data"
      - '{"Node":"canary-valkey","Address":"valkey","NodeMeta":{"driver":"valkey"}}'
      - "http://consul:8500/v1/catalog/register"

  etcd:
    container_name: canary-ng-etcd
    image: quay.io/coreos/etcd:v3.5.17
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  register-etcd:
    container_name: canary-ng-register-etcd
    image: *register-image
    restart: "no"
    depends_on:
      consul:
        condition: service_healthy
      etcd:
        condition: service_healthy
    command:
      - "-sS"
      - "--fail"
      - "--retry"
      - "10"
      - "--retry-all-errors"
      - "-X"
      - "PUT"
      - "--data"
      - '{"Node":"canary-etcd","Address":"etcd","NodeMeta":{"driver":"etcd"}}'
      - "http://consul:8500/v1/catalog/register"

  canary-ng:
    container_name: canary-ng
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CONFIG_PATH: /etc/canary-ng.yaml
    volumes:
      - ./docker/e2e/canary-ng.yaml:/etc/canary-ng.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      consul:
        condition: service_healthy
      register-postgresql:
        condition: service_completed_successfully
      register-mysql:
        condition: service_completed_successfully
      register-mongodb:
        condition: service_completed_successfully
      register-clickhouse:
        condition: service_completed_successfully
      register-valkey:
        condition: service_completed_successfully
      register-etcd:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/metrics"]
      interval: 5s
      timeout: 5s
      retries: 15

  prometheus:
    container_name: canary-ng-prometheus
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/e2e/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      canary-ng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 15

  grafana:
    container_name: canary-ng-grafana
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_USER: canary
      GF_SECURITY_ADMIN_PASSWORD: canary
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 15
